name: Selenium QA Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  selenium-test:
    name: Run Selenium Tests (Headless Chrome)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install selenium==4.20.0 pytest==8.2.0 pytest-html==4.1.1 allure-pytest==2.13.5 webdriver-manager==4.0.1

      - name: Prepare directories
        run: mkdir -p reports/screenshots reports/allure-results

      - name: Run Selenium Tests
        run: |
          python -m pytest tests/ \
            --html=reports/report.html \
            --self-contained-html \
            -v --maxfail=5
        continue-on-error: true

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: pytest-html-report
          path: reports/report.html

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: fail-screenshots
          path: reports/screenshots/
          if-no-files-found: ignore